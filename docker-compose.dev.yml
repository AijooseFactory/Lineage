# Lineage Development Environment
# Project name "dev" → containers appear alongside other dev containers in Docker Desktop
#
# Services (Docker Desktop strips the "dev-" project prefix from display names):
#   dev-dev-lineage-api → displays as "dev-lineage-api"  (Python / Gunicorn, port 5555)
#   dev-dev-lineage     → displays as "dev-lineage"      (@web/dev-server, port 8001)
#
# Network: Lineage_Development
#
# The API is mapped to host port 5555 to match the frontend dev server's hardcoded
# API fallback URL (http://localhost:5555), so no proxy container is required.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f dev-lineage
#   docker compose -f docker-compose.dev.yml logs -f dev-lineage-api
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml down -v    # destroy volumes (fresh state)

name: dev

networks:
  Lineage_Development:
    name: Lineage_Development
    driver: bridge

volumes:
  lineage-db:
    name: lineage-db
  lineage-media:
    name: lineage-media
  lineage-users:
    name: lineage-users
  lineage-search-index:
    name: lineage-search-index
  lineage-node-modules:
    name: lineage-node-modules

services:

  # ─────────────────────────────────────────────────────────
  # dev-lineage-api  — Lineage API backend
  #
  # Builds from _lineage-api/Dockerfile (Gramps Web API fork).
  # Owns and manages the Lineage genealogy database (SQLite by
  # default; set LINEAGE_DB_URI for PostgreSQL).
  #
  # Mapped to host port 5555 to match the frontend dev server's
  # hardcoded API fallback (http://localhost:5555).
  # ─────────────────────────────────────────────────────────
  dev-dev-lineage-api:
    container_name: dev-lineage-api
    build:
      context: ./_lineage-api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - Lineage_Development
    # .env is relative to this compose file (Lineage/.env).
    # It supplies OLLAMA_API_KEY for Ollama Cloud :cloud model auth.
    # All other sensitive/runtime vars are set explicitly below.
    env_file: .env
    environment:
      GRAMPSWEB_SECRET_KEY:               ${LINEAGE_SECRET_KEY:-dev-secret-change-in-prod}
      GRAMPSWEB_TREE:                     ${LINEAGE_TREE:-Lineage}
      GRAMPSWEB_CORS_ORIGINS:             "http://localhost:8001"
      # ── AI Chat ────────────────────────────────────────────────────────────
      # Semantic search embedding model (Ollama, running on Mac host)
      GRAMPSWEB_VECTOR_EMBEDDING_MODEL:   qwen3-embedding:8b
      # Ollama OpenAI-compatible endpoint on the Mac host
      GRAMPSWEB_LLM_BASE_URL:             http://host.docker.internal:11434/v1
      # Active LLM for chat (Ollama Cloud authenticated model)
      GRAMPSWEB_LLM_MODEL:               gpt-oss:120b-cloud
      # Required sentinel value for the OpenAI-compatible client used by pydantic-ai
      OPENAI_API_KEY:                     ollama
      # OLLAMA_API_KEY is loaded from env_file (.env) — do NOT hardcode here.
      # It authenticates :cloud model requests through Ollama Cloud.
      # ── Chat access default ────────────────────────────────────────────────
      # 4 = ROLE_OWNER — enables chat for Owners + Administrators by default.
      # The UI in Manage Users can override this per-tree at runtime.
      GRAMPSWEB_DEFAULT_MIN_ROLE_AI:      4
      # ── Custom system prompt (optional) ───────────────────────────────────
      # Uncomment and set LINEAGE_SYSTEM_PROMPT in .env to override the
      # default system prompt in agent.py without touching code.
      # GRAMPSWEB_LLM_SYSTEM_PROMPT: ${LINEAGE_SYSTEM_PROMPT}
    volumes:
      - lineage-db:/root/.gramps/grampsdb
      - lineage-media:/app/media
      - lineage-users:/app/users
      - lineage-search-index:/app/indexdir   # persists semantic search index
    ports:
      - "5555:5000"

  # ─────────────────────────────────────────────────────────
  # dev-lineage  — Lineage frontend dev server
  #
  # LitElement app via @web/dev-server with hot reload.
  # Source bind-mounted for live edits; node_modules in a
  # named volume to keep them container-local and writable.
  #
  # http://localhost:8001
  # ─────────────────────────────────────────────────────────
  dev-dev-lineage:
    container_name: dev-lineage
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    networks:
      - Lineage_Development
    command: >
      sh -c "npm install && npm start -- --hostname 0.0.0.0"
    volumes:
      - ./:/app
      - lineage-node-modules:/app/node_modules
    ports:
      - "8001:8001"
    depends_on:
      - dev-dev-lineage-api
